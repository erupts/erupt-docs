<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <style>.s{font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}</style>
  <rect width="400" height="250" rx="10" fill="#ffffff"/>
  <!-- row 1 -->
  <rect x="52" y="76" width="96" height="40" rx="6" fill="#4b5cc4"/>
  <text x="100" y="101" text-anchor="middle" class="s" font-size="13" fill="#ffffff">Submit</text>
  <rect x="164" y="76" width="96" height="40" rx="6" fill="#ffffff" stroke="#d9d9d9" stroke-width="1.5"/>
  <text x="212" y="101" text-anchor="middle" class="s" font-size="13" fill="#262626">Cancel</text>
  <rect x="276" y="76" width="76" height="40" rx="6" fill="#ffffff" stroke="#d9d9d9" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="314" y="101" text-anchor="middle" class="s" font-size="13" fill="#595959">More</text>
  <!-- row 2 -->
  <rect x="52" y="140" width="96" height="40" rx="6" fill="#ffffff" stroke="#ff4d4f" stroke-width="1.5"/>
  <text x="100" y="165" text-anchor="middle" class="s" font-size="13" fill="#ff4d4f">Delete</text>
  <text x="196" y="165" text-anchor="middle" class="s" font-size="13" fill="#4b5cc4" text-decoration="underline">Edit</text>
  <rect x="240" y="140" width="112" height="40" rx="6" fill="#f5f5f5"/>
  <text x="296" y="165" text-anchor="middle" class="s" font-size="13" fill="#bfbfbf">Disabled</text>
</svg>
