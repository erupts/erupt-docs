<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <style>.t{font-family:Georgia,'Times New Roman',serif}.u{font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}</style>
  <rect width="400" height="250" rx="10" fill="#ffffff"/>
  <rect x="40" y="32" width="320" height="186" rx="8" fill="#ffffff" stroke="#d9d9d9" stroke-width="1.5"/>
  <!-- toolbar -->
  <line x1="40" y1="70" x2="360" y2="70" stroke="#f0f0f0" stroke-width="1.5"/>
  <text x="58" y="57" class="t" font-size="15" font-weight="700" fill="#262626">B</text>
  <text x="84" y="57" class="t" font-size="15" font-style="italic" fill="#595959">I</text>
  <text x="104" y="57" class="u" font-size="15" fill="#595959" text-decoration="underline">U</text>
  <line x1="130" y1="42" x2="130" y2="60" stroke="#f0f0f0" stroke-width="1.5"/>
  <!-- list icon -->
  <g stroke="#595959" stroke-width="1.6" stroke-linecap="round">
    <line x1="148" y1="45" x2="164" y2="45"/><line x1="148" y1="51" x2="164" y2="51"/><line x1="148" y1="57" x2="164" y2="57"/>
  </g>
  <g fill="#595959">
    <circle cx="143" cy="45" r="1.4"/><circle cx="143" cy="51" r="1.4"/><circle cx="143" cy="57" r="1.4"/>
  </g>
  <!-- image icon -->
  <rect x="182" y="42" width="18" height="16" rx="2" fill="none" stroke="#595959" stroke-width="1.5"/>
  <circle cx="188" cy="47" r="1.8" fill="#595959"/>
  <path d="M183,55 l5,-5 l4,4 l3,-3 l4,4" fill="none" stroke="#595959" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- link icon -->
  <g stroke="#595959" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M222,52 a5,5 0 0 1 0,-7 l4,-4 a5,5 0 0 1 7,7"/>
    <path d="M230,44 a5,5 0 0 1 0,7 l-4,4 a5,5 0 0 1 -7,-7"/>
  </g>
  <!-- content -->
  <text x="58" y="102" class="u" font-size="17" font-weight="700" fill="#262626">Hello Erupt</text>
  <rect x="58" y="120" width="266" height="9" rx="4.5" fill="#e8e8e8"/>
  <rect x="58" y="140" width="284" height="9" rx="4.5" fill="#e8e8e8"/>
  <rect x="58" y="160" width="120" height="9" rx="4.5" fill="#4b5cc4" opacity=".35"/>
  <rect x="186" y="160" width="112" height="9" rx="4.5" fill="#e8e8e8"/>
  <rect x="58" y="180" width="200" height="9" rx="4.5" fill="#e8e8e8"/>
</svg>
