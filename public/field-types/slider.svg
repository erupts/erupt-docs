<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <style>.s{font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}</style>
  <rect width="400" height="250" rx="10" fill="#ffffff"/>
  <!-- tooltip -->
  <rect x="206" y="86" width="48" height="32" rx="6" fill="#262626"/>
  <path d="M224,118 l6,7 l6,-7 z" fill="#262626"/>
  <text x="230" y="107" text-anchor="middle" class="s" font-size="14" fill="#ffffff">60</text>
  <!-- track -->
  <rect x="50" y="147" width="300" height="6" rx="3" fill="#f0f0f0"/>
  <rect x="50" y="147" width="180" height="6" rx="3" fill="#4b5cc4"/>
  <!-- marks -->
  <circle cx="125" cy="150" r="3" fill="#ffffff" stroke="#4b5cc4" stroke-width="1.5"/>
  <circle cx="275" cy="150" r="3" fill="#ffffff" stroke="#d9d9d9" stroke-width="1.5"/>
  <!-- handle -->
  <circle cx="230" cy="150" r="11" fill="#ffffff" stroke="#4b5cc4" stroke-width="2.5"/>
  <!-- scale labels -->
  <text x="50" y="182" class="s" font-size="11" fill="#8c959f">0</text>
  <text x="350" y="182" text-anchor="end" class="s" font-size="11" fill="#8c959f">100</text>
</svg>
